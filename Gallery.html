    /* ========================
       📷 GALLERY GRID
       ======================== */
    /* Keep .row for other stuff like videos if needed */
.row {
  display: flex;
  flex-wrap: wrap;
  padding: 0 4px;
}


/* 📌 Pinterest-style masonry gallery */
#gallery {
  position: relative;
  display: block !important;
  width: 100%;
  padding: 0;
  grid-template-columns: none !important;
}

#gallery .column {
  position: absolute;
  margin: 0;
  padding: 0;
  top: 0;
  left: 0;
}


    .image-container {
      position: relative;
      margin: 0;
      overflow: hidden;
      border-radius: 12px;
      transition: transform 0.2s ease-in-out;
    }


    .image-container img,
    .image-container video {
      width: 100%;
      vertical-align: middle;
      display: block;
    }


    .image-container:hover {
      transform: scale(1.05);
      cursor: pointer;
    }


    .image-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0,0,0,0.6);
      color: #fff;
      text-align: center;
      padding: 8px 0;
      opacity: 0;
      transition: opacity 0.3s ease;
      font-size: 0.875rem;
    }


    .image-container:hover .image-overlay {
      opacity: 1;
    }


    /* ========================
       🔍 MODAL / LIGHTBOX + GLITTER
       ======================== */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      padding-top: 60px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(255,255,255,0.9);
    }


    .modal-content,
    .modal-video {
      margin: auto;
      display: block;
      max-width: 80%;
      max-height: 80vh;
      animation: zoom-in 0.4s;
      transition: transform 0.3s ease-in-out;
      position: relative;
      cursor: zoom-in;
      will-change: transform;
    }


    .modal-content.zoomed {
      cursor: grab;
      max-width: none;
    }


    .modal-content.dragging {
      cursor: grabbing;
    }


    @keyframes zoom-in {
      from { transform: scale(0.1); }
      to   { transform: scale(1); }
    }


    /* Modal top-bar buttons (close + download) */
    .modal-btn-bar {
      position: absolute;
      top: 15px;
      right: 20px;
      z-index: 2;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .modal-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid #faa1c9;
      background: rgba(255, 255, 255, 0.9);
      color: #555;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      text-decoration: none;
      line-height: 1;
      backdrop-filter: blur(4px);
    }

    .modal-btn:hover {
      background: #faa1c9;
      color: #fff;
      border-color: #faa1c9;
      transform: scale(1.1);
    }

    .modal-btn.close-btn {
      font-size: 26px;
      font-weight: bold;
    }

    /* Video in lightbox: show native controls */
    .modal-video {
      cursor: default;
      border-radius: 8px;
    }


    /* ✨ CSS Sparkles (GPU-accelerated, replaces canvas) */
    .sparkle-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      pointer-events: none;
      opacity: 0;
      animation: sparkle-twinkle var(--sparkle-dur, 3s) ease-in-out infinite;
      animation-delay: var(--sparkle-delay, 0s);
    }

    @keyframes sparkle-twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%      { opacity: var(--sparkle-peak, 0.7); transform: scale(1.15); }
    }


    /* ========================
       🔙 BACK BUTTON
       ======================== */
    .back-button {
      position: fixed;
      top: 14rem;
      left: 1.5rem;
      z-index: 50;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background-color: #ffff;
      outline: 1px solid #faa1c9;
      border: 2px solid var(--color-accent-pastelpink);
      font-size: 24px;
      color: var(--color-text-dark);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }


    .back-button:hover {
      transform: scale(1.1);
      background-color: var(--color-accent-pastelpink);
      color: var(--color-primary-bg);
    }


    /* 🔄 Infinite-scroll loader */
    #gallery-loader {
      text-align: center;
      padding: 2rem 0;
      color: #faa1c9;
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      display: none;  /* shown by JS when loading */
    }

    #gallery-loader .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #ffe2f5;
      border-top-color: #faa1c9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #scroll-sentinel {
      width: 100%;
      height: 1px;
    }

    /* Ensure fixed things under loader */
    header, #floating-image, .fixed { z-index: 10; }
    </style>

<script>
const owner = "CandyCode551";
const repo = "TheCandieBox";
const folderPath = "img/gallery";
const branch = "main";


const gallery = document.getElementById("gallery");


function parseDateFromFilename(filename) {
  const cleanName = filename.replace(/\.[^.]+$/, "");


  const patterns = [
    /\[(\d{1,2})-(\d{1,2})-(\d{2,4})\]/,   // [5-17-16]
    /\((\d{1,2})-(\d{1,2})-(\d{2,4})\)/,   // (5-17-16)
    /(\d{1,2})-(\d{1,2})-(\d{2,4})/        // 5-17-16 anywhere
  ];


  for (const pattern of patterns) {
    const match = cleanName.match(pattern);
    if (!match) continue;


    // 👇 month, then day, then year (MM-DD-YY or MM-DD-YYYY)
    let [, month, day, year] = match;


    month = parseInt(month, 10);
    day   = parseInt(day, 10);
    year  = parseInt(year, 10);


    // Turn 16 → 2016
    if (year < 100) year += 2000;


    const date = new Date(year, month - 1, day);


    // validate the date we just built
    if (
      date.getFullYear() === year &&
      date.getMonth() === month - 1 &&
      date.getDate() === day
    ) {
      return date;
    }
  }


  return null;
}
function cleanDisplayName(filename) {
  return filename
    .replace(/\.(png|jpe?g|gif|webp|mp4)$/i, "")
    .replace(/\s*[\[\(]\d{1,2}-\d{1,2}-\d{2,4}[\]\)]\s*/g, "")
    .replace(/\s+\d{1,2}-\d{1,2}-\d{2,4}$/g, "")
    .trim();
}


/* ========================
   📌 PINTEREST MASONRY ENGINE
   ======================== */
const MASONRY_GAP = 10;

function getColumnCount() {
  if (window.innerWidth <= 600) return 1;
  if (window.innerWidth <= 800) return 2;
  return 3;
}

let masonryTimer;
function requestMasonryLayout() {
  clearTimeout(masonryTimer);
  masonryTimer = setTimeout(layoutMasonry, 80);
}

function layoutMasonry() {
  const items = Array.from(gallery.querySelectorAll('.column'));
  if (!items.length) return;

  const numCols = getColumnCount();
  const containerWidth = gallery.clientWidth;
  if (containerWidth === 0) return;

  const colWidth = (containerWidth - MASONRY_GAP * (numCols - 1)) / numCols;
  const colHeights = new Array(numCols).fill(0);

  items.forEach(item => {
    item.style.position = 'absolute';
    item.style.width = colWidth + 'px';

    const shortest = colHeights.indexOf(Math.min(...colHeights));
    item.style.left = shortest * (colWidth + MASONRY_GAP) + 'px';
    item.style.top  = colHeights[shortest] + 'px';

    colHeights[shortest] += item.offsetHeight + MASONRY_GAP;
  });

  gallery.style.height = Math.max(...colHeights) + 'px';
}

// Re-layout on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(layoutMasonry, 150);
});


/* ========================
   📦 BATCH LOADING + INFINITE SCROLL
   ======================== */
const BATCH_SIZE = 12;
let allMediaFiles = [];
let loadedCount = 0;
let isLoadingBatch = false;

const galleryLoader = document.getElementById('gallery-loader');
const scrollSentinel = document.getElementById('scroll-sentinel');


/* 🎬 Video visibility observer — only play videos in viewport */
const videoVisObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const vid = entry.target;
    if (entry.isIntersecting) {
      vid.play().catch(() => {});
    } else {
      vid.pause();
    }
  });
}, { threshold: 0.15 });


function renderBatch() {
  if (isLoadingBatch || loadedCount >= allMediaFiles.length) return;
  isLoadingBatch = true;
  galleryLoader.style.display = 'block';

  const batch = allMediaFiles.slice(loadedCount, loadedCount + BATCH_SIZE);

  batch.forEach(file => {
    const displayName = cleanDisplayName(file.name);
    const wrap = document.createElement('div');
    wrap.className = 'column';

    if (file.isVideo) {
      wrap.innerHTML = `
        <div class="image-container" data-type="video" data-full-src="${file.download_url}">
          <video
            loop
            muted
            playsinline
            preload="none"
            disablepictureinpicture
            style="width:100%; display:block;"
          >
            <source src="${file.download_url}" type="video/mp4">
          </video>
          <div class="image-overlay">${displayName || file.name}</div>
        </div>
      `;
      const vid = wrap.querySelector('video');
      if (vid) {
        vid.addEventListener('loadeddata', requestMasonryLayout);
        videoVisObserver.observe(vid);  // play only when visible
      }
    } else {
      wrap.innerHTML = `
        <div class="image-container" data-type="image" data-full-src="${file.download_url}">
          <img src="${file.download_url}" alt="${displayName}" decoding="async">
          <div class="image-overlay">${displayName || file.name}</div>
        </div>
      `;
      const img = wrap.querySelector('img');
      if (img) img.addEventListener('load', requestMasonryLayout);
    }

    gallery.appendChild(wrap);
  });

  loadedCount += batch.length;

  layoutMasonry();
  bindLightbox();

  isLoadingBatch = false;

  // Hide loader if all items are loaded
  if (loadedCount >= allMediaFiles.length) {
    galleryLoader.style.display = 'none';
  }
}


/* Infinite-scroll observer: load next batch when sentinel nears viewport */
const scrollObserver = new IntersectionObserver((entries) => {
  if (entries[0].isIntersecting && loadedCount < allMediaFiles.length) {
    renderBatch();
  }
}, { rootMargin: '400px' });  // trigger 400px before sentinel is visible

scrollObserver.observe(scrollSentinel);


async function loadGalleryFromGitHub() {
  try {
    galleryLoader.style.display = 'block';

    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${folderPath}?ref=${branch}`;
    const res = await fetch(url);
    const files = await res.json();

    console.log("GitHub URL:", url);
    console.log("GitHub status:", res.status);

    if (!Array.isArray(files)) {
      gallery.innerHTML = `<p style="color:black;">GitHub API error: ${files.message || "Unknown error"}</p>`;
      galleryLoader.style.display = 'none';
      return;
    }

    allMediaFiles = files
      .filter(file =>
        file.type === "file" &&
        /\.(png|jpe?g|gif|webp|mp4)$/i.test(file.name)
      )
      .map(file => ({
        ...file,
        parsedDate: parseDateFromFilename(file.name),
        isVideo: /\.mp4$/i.test(file.name)
      }))
      .sort((a, b) => {
        if (a.parsedDate && b.parsedDate) return b.parsedDate - a.parsedDate;
        if (a.parsedDate && !b.parsedDate) return -1;
        if (!a.parsedDate && b.parsedDate) return 1;
        return a.name.localeCompare(b.name, undefined, {
          numeric: true,
          sensitivity: "base"
        });
      });

    console.log(`Found ${allMediaFiles.length} files, loading first ${BATCH_SIZE}…`);

    if (allMediaFiles.length === 0) {
      gallery.innerHTML = `<p style="color:black;">No matching files found.</p>`;
      galleryLoader.style.display = 'none';
      return;
    }

    gallery.innerHTML = '';
    loadedCount = 0;
    renderBatch();  // load first batch

  } catch (err) {
    console.error(err);
    gallery.innerHTML = `<p style="color:black;">Failed to load gallery.</p>`;
    galleryLoader.style.display = 'none';
  }
}
loadGalleryFromGitHub();
</script>

  <script>
    // 🗓️ Current year in footer
    document.getElementById('year').textContent = new Date().getFullYear();


    // 💖 Adjust layout for top social bar
    (function () {
      const bar = document.getElementById('top-social-bar');
      const header = document.querySelector('header');


      function adjustLayout() {
        if (!bar) return;
        const h = bar.offsetHeight;
        document.body.style.paddingTop = h + 'px';
        if (header) header.style.top = h + 'px';
      }


      window.addEventListener('load', adjustLayout);
      window.addEventListener('resize', adjustLayout);
      new MutationObserver(adjustLayout).observe(document.documentElement, {
        childList: true,
        subtree: true
      });
    })();


    // ✨ Slideshow logic (unchanged)
    let slideIndex = 0;
    let slideInterval;


    function showSlides() {
      let i;
      const slides = document.getElementsByClassName("mySlides");
      const dots = document.getElementsByClassName("dot");


      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }


      slideIndex++;
      if (slideIndex > slides.length) { slideIndex = 1; }


      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }


      if (slides[slideIndex - 1]) {
        slides[slideIndex - 1].style.display = "block";
        dots[slideIndex - 1].className += " active";
      }
    }


    function plusSlides(n) {
      clearInterval(slideInterval);
      showSlidesManual(slideIndex += n);
      slideInterval = setInterval(showSlides, 4000);
    }


    function currentSlide(n) {
      clearInterval(slideInterval);
      showSlidesManual(slideIndex = n);
      slideInterval = setInterval(showSlides, 4000);
    }


    function showSlidesManual(n) {
      let i;
      const slides = document.getElementsByClassName("mySlides");
      const dots = document.getElementsByClassName("dot");
      if (n > slides.length) { slideIndex = 1; }
      if (n < 1) { slideIndex = slides.length; }


      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";
      }
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active", "");
      }


      if (slides[slideIndex - 1]) {
        slides[slideIndex - 1].style.display = "block";
        dots[slideIndex - 1].className += " active";
      }
    }


    document.addEventListener('DOMContentLoaded', () => {
      showSlides();
      slideInterval = setInterval(showSlides, 4000);
    });


    // 💕 Heart trail + click effect (unchanged)
    let trailCounter = 0;
    const HEART_SPAWN_FREQUENCY = 12;


    function createTrailElement(x, y, className, content, duration) {
      const element = document.createElement('span');
      element.textContent = content;
      element.className = 'trail-element ' + className;


      const dx = (Math.random() - 0.5) * 40;
      const dy = -(Math.random() * 80 + 100);
      const rotStart = (Math.random() * 90) - 45;
      const rotEnd = rotStart + (Math.random() > 0.5 ? 90 : -90);


      element.style.left = `${x}px`;
      element.style.top = `${y}px`;
      element.style.animationDuration = `${duration}s`;
      element.style.setProperty('--dx', `${dx}px`);
      element.style.setProperty('--dy', `${dy}px`);
      element.style.setProperty('--rot-start', `${rotStart}deg`);
      element.style.setProperty('--rot-end', `${rotEnd}deg`);


      document.body.appendChild(element);


      setTimeout(() => element.remove(), duration * 1000);
    }


    document.addEventListener('mousemove', (e) => {
      trailCounter++;
      const x = e.clientX;
      const y = e.clientY;


      if (trailCounter % HEART_SPAWN_FREQUENCY === 0) {
        createTrailElement(x, y, 'heart-trail', '✧', 3.5);
      }
    });


    document.addEventListener('click', (e) => {
      const clickHeart = document.createElement('span');
      clickHeart.textContent = '♡';
      clickHeart.className = 'trail-element click-heart';
      clickHeart.style.left = `${e.clientX - 25}px`;
      clickHeart.style.top = `${e.clientY - 25}px`;
      document.body.appendChild(clickHeart);
      setTimeout(() => clickHeart.remove(), 600);
    });


    // 🔝 Back to top + header/footer animations
    const backToTopButton = document.getElementById("back-to-top-btn");
    const scrollThreshold = 200;


    window.addEventListener('scroll', () => {
      const headerContainer = document.getElementById('header-container');
      const headerTitle = document.getElementById('header-title');
      const footerImg = document.getElementById('floating-footer-image');
      const laceImg = document.getElementById('header-lace');
      const backbtn = document.getElementById('backbtn');


      const scrollY = window.scrollY || document.documentElement.scrollTop;
      const viewportH = window.innerHeight;
      const docH = document.documentElement.scrollHeight;


      const fromTop = scrollY > 50;
      const nearBottom = scrollY + viewportH > docH - 50;


      // shrink header + animate lace/footer
      if (fromTop && !nearBottom) {
        headerContainer.classList.remove('py-3.5');
        headerContainer.classList.add('py-1');
        headerTitle.classList.remove('text-3xl');
        headerTitle.classList.add('text-2xl');


        if (laceImg) {
          laceImg.style.opacity = "0.9";
          laceImg.style.transform = "translateY(-80px)";
        }
        if (footerImg) {
          footerImg.style.opacity = "0.2";
          footerImg.style.transform = "translateY(100px)";
        }
        if (backbtn) {
          backbtn.style.opacity = "1";
          backbtn.style.transform = "translateY(-80px)";
        }
      } else {
        headerContainer.classList.add('py-3.5');
        headerContainer.classList.remove('py-1');
        headerTitle.classList.add('text-3xl');
        headerTitle.classList.remove('text-2xl');


        if (laceImg) {
          laceImg.style.opacity = "1";
          laceImg.style.transform = "translateY(0)";
        }
        if (footerImg) {
          footerImg.style.opacity = "1";
          footerImg.style.transform = "translateY(0)";
        }
        if (backbtn) {
          backbtn.style.opacity = "1";
          backbtn.style.transform = "translateY(0)";
        }
      }


      // back‑to‑top button
      if (scrollY > scrollThreshold) {
        backToTopButton.style.display = "block";
        setTimeout(() => {
          backToTopButton.style.opacity = "1";
          backToTopButton.style.transform = "translateY(0)";
        }, 10);
      } else {
        backToTopButton.style.opacity = "0";
        backToTopButton.style.transform = "translateY(20px)";
        setTimeout(() => {
          backToTopButton.style.display = "none";
        }, 300);
      }
    });


    backToTopButton.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>


  <script>
  document.addEventListener('DOMContentLoaded', function () {
    const birthDate = new Date(2003, 5, 17); // May 17, 2003


    function getAge(dob) {
      const today = new Date();
      let age = today.getFullYear() - dob.getFullYear();
      const m = today.getMonth() - dob.getMonth();
      if (m < 0 || (m === 0 && today.getDate() < dob.getDate())) {
        age--;
      }
      return age;
    }


    const ageSpan = document.getElementById('age');
    if (ageSpan) {
      ageSpan.textContent = getAge(birthDate);
    } else {
      console.warn('Age span not found');
    }
  });
  // ✨ Button Sheen
  (function () {
    const btn = document.getElementById('magic-btn');
    if (!btn) return;


    function handleMove(e) {
      const rect = btn.getBoundingClientRect();
      const rawX = e.clientX - rect.left;


      // offset sheen 20px to the left of the cursor
      const sheenX = rawX - 20;


      // clamp inside button so it doesn't wander too far
      const clampedX = Math.max(0, Math.min(rect.width, sheenX));


      // -0.5 to 0.5 for tilt
      const t = (rawX / rect.width) - 0.5;


      btn.style.setProperty('--x', clampedX);


      const rotateY = t * 16;
      btn.style.transform =
        `translateY(-4px) scale(1.04) rotateY(${rotateY}deg)`;
    }


    function handleLeave() {
      btn.style.transform = '';
      btn.style.removeProperty('--x');
    }


    btn.addEventListener('mousemove', handleMove);
    btn.addEventListener('mouseleave', handleLeave);
  })();
</script>


  <!-- 📜 LIGHTBOX / MODAL SCRIPT -->
  <script>
    const modal = document.getElementById("myModal");
    const modalImg = document.getElementById("modal-img");
    const modalVideo = document.getElementById("modal-video");
    const sparkleContainer = document.getElementById("sparkle-container");
    const downloadBtn = document.getElementById("modal-download-btn");
    const closeBtn = document.getElementById("modal-close-btn");

    let isDragging = false;
    let didDrag = false;
    let startX, startY;
    let translateX = 0, translateY = 0;
    let dragRaf = null;

    // Track current media for download
    let currentMediaUrl = "";
    let currentMediaName = "download";

    const zoomScale = 1.75;

    /* ---- helpers ---- */
    function closeModal() {
      modal.style.display = "none";
      modalVideo.pause();
      modalVideo.removeAttribute("src");
      modalVideo.load(); // reset video element fully
      stopSparkles();
    }

    /* ---- download (fetch-as-blob for cross-origin support) ---- */
    function downloadCurrentMedia() {
      if (!currentMediaUrl) return;

      // Visual feedback
      downloadBtn.textContent = "…";
      downloadBtn.style.pointerEvents = "none";

      fetch(currentMediaUrl)
        .then(res => {
          if (!res.ok) throw new Error("Network error");
          return res.blob();
        })
        .then(blob => {
          const blobUrl = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = blobUrl;
          a.download = currentMediaName;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(blobUrl);
        })
        .catch(() => {
          // Fallback: open in new tab
          window.open(currentMediaUrl, "_blank");
        })
        .finally(() => {
          downloadBtn.textContent = "\u2913";
          downloadBtn.style.pointerEvents = "";
        });
    }

    downloadBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      downloadCurrentMedia();
    });

    /* ---- open lightbox (called after each batch) ---- */
    function bindLightbox() {
      // Only bind containers that haven't been bound yet
      document.querySelectorAll(".image-container:not([data-lb-bound])").forEach(container => {
        container.setAttribute("data-lb-bound", "1");
        container.onclick = function () {
          const type = this.getAttribute("data-type");
          // Use data-full-src for full-quality lightbox
          const fullSrc = this.getAttribute("data-full-src") || "";
          modal.style.display = "block";
          startSparkles();

          // Reset zoom / drag
          modalImg.classList.remove("zoomed", "dragging");
          modalImg.style.transform = "scale(1)";
          translateX = 0;
          translateY = 0;

          // Get the overlay text for a clean filename
          const overlay = this.querySelector(".image-overlay");
          const rawName = overlay ? overlay.textContent.trim() : "";

          if (type === "video") {
            currentMediaUrl = fullSrc;
            currentMediaName = (rawName || "video") + ".mp4";

            modalImg.style.display = "none";
            modalVideo.style.display = "block";
            modalVideo.src = fullSrc;
            modalVideo.muted = false; // unmute in lightbox
            modalVideo.play();
          } else {
            currentMediaUrl = fullSrc;
            const ext = fullSrc.match(/\.(png|jpe?g|gif|webp)$/i)?.[0] || ".png";
            currentMediaName = (rawName || "image") + ext;

            modalVideo.style.display = "none";
            modalVideo.pause();
            modalVideo.removeAttribute("src");
            modalImg.style.display = "block";
            modalImg.src = fullSrc;  // full-res in lightbox
          }
        };
      });
    }

    /* ---- close handlers ---- */
    closeBtn.onclick = (e) => { e.stopPropagation(); closeModal(); };

    window.addEventListener("click", (e) => {
      if (e.target === modal) closeModal();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && modal.style.display === "block") closeModal();
    });

    /* ---- click-to-zoom (images only) ---- */
    modalImg.addEventListener("click", (e) => {
      e.stopPropagation();
      if (didDrag) return;

      if (modalImg.classList.contains("zoomed")) {
        modalImg.classList.remove("zoomed");
        modalImg.style.transform = "scale(1)";
        translateX = 0;
        translateY = 0;
      } else {
        modalImg.classList.add("zoomed");
        modalImg.style.transform = `scale(${zoomScale})`;
      }
    });

    /* ---- drag (rAF-throttled for smooth 60fps) ---- */
    function applyDrag() {
      modalImg.style.transform =
        `scale(${zoomScale}) translate(${translateX}px, ${translateY}px)`;
      dragRaf = null;
    }

    function onPointerDown(e) {
      if (!modalImg.classList.contains("zoomed")) return;
      e.preventDefault();
      isDragging = true;
      didDrag = false;
      modalImg.classList.add("dragging");
      const pt = e.touches ? e.touches[0] : e;
      startX = pt.clientX - translateX;
      startY = pt.clientY - translateY;
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      didDrag = true;
      const pt = e.touches ? e.touches[0] : e;
      translateX = pt.clientX - startX;
      translateY = pt.clientY - startY;
      if (!dragRaf) dragRaf = requestAnimationFrame(applyDrag);
    }

    function onPointerUp() {
      if (!isDragging) return;
      setTimeout(() => { isDragging = false; didDrag = false; }, 0);
      modalImg.classList.remove("dragging");
    }

    // Mouse events
    modalImg.addEventListener("mousedown", onPointerDown);
    window.addEventListener("mousemove", onPointerMove);
    window.addEventListener("mouseup", onPointerUp);

    // Touch events (mobile)
    modalImg.addEventListener("touchstart", onPointerDown, { passive: false });
    window.addEventListener("touchmove", onPointerMove, { passive: false });
    window.addEventListener("touchend", onPointerUp);

    /* ---- sparkles (pure CSS, no animation loop) ---- */
    const sparkleChars = ["\u2727", "\u27E1", "\u2726"];  // ✧ ⟡ ✦
    const sparkleColors = ["#FFFFFF", "#FFB8DC", "#FFE2F5", "#F0F8FF"];

    function startSparkles() {
      sparkleContainer.innerHTML = "";
      for (let i = 0; i < 45; i++) {
        const el = document.createElement("span");
        el.className = "sparkle";
        el.textContent = sparkleChars[Math.random() * sparkleChars.length | 0];
        el.style.left   = Math.random() * 100 + "%";
        el.style.top    = Math.random() * 100 + "%";
        el.style.fontSize = (Math.random() * 14 + 14) + "px";
        el.style.color  = sparkleColors[Math.random() * sparkleColors.length | 0];
        el.style.setProperty("--sparkle-dur",   (Math.random() * 3 + 2).toFixed(1) + "s");
        el.style.setProperty("--sparkle-delay", (Math.random() * 4).toFixed(1) + "s");
        el.style.setProperty("--sparkle-peak",  (Math.random() * 0.4 + 0.3).toFixed(2));
        sparkleContainer.appendChild(el);
      }
    }

    function stopSparkles() {
      sparkleContainer.innerHTML = "";
    }
  </script>
  <!-- 📜 SCRIPTS END 📜 -->
